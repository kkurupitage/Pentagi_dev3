# KPMG Azure OpenAI Provider Configuration
# This file maps PentAGI agent types to KPMG Azure OpenAI models
# 
# Available KPMG Models (from your APIM portal):
# - gpt-4o-2024-11-20-dzs-we
# - gpt-4o-2024-08-06-dzs-we
# - gpt-4o-mini-2024-07-18-dzs-we
# - gpt-4-1-2025-04-14-dzs-we
# - gpt-5-2025-08-07-dzs-sdc
# - o3-mini-2025-01-31-dzs-sdc
# - text-embedding-3-large-1-std-sdc

# Simple completion agent (non-JSON responses)
simple:
  model: "gpt-4o-2024-11-20-dzs-we"
  temperature: 0.7
  top_p: 0.95
  n: 1
  max_tokens: 4000

# JSON response agent
simple_json:
  model: "gpt-4o-2024-11-20-dzs-we"
  temperature: 0.7
  top_p: 1.0
  n: 1
  max_tokens: 4000
  json: true

# Main pentesting agent (most important)
agent:
  model: "gpt-4o-2024-11-20-dzs-we"
  temperature: 0.7
  top_p: 1.0
  n: 1
  max_tokens: 16000

# Planning agent (creates test strategies)
planner:
  model: "gpt-4o-2024-11-20-dzs-we"
  temperature: 0.7
  top_p: 1.0
  n: 1
  max_tokens: 16000

# Advice agent (provides expert guidance)
advice:
  model: "gpt-4o-2024-11-20-dzs-we"
  temperature: 0.7
  top_p: 1.0
  n: 1
  max_tokens: 16000

# Coder agent (generates code/scripts)
coder:
  model: "gpt-4o-2024-11-20-dzs-we"
  temperature: 0.7
  top_p: 1.0
  n: 1
  max_tokens: 16000

# Pentester agent (executes security tests)
pentester:
  model: "gpt-4o-2024-11-20-dzs-we"
  temperature: 0.7
  top_p: 1.0
  n: 1
  max_tokens: 16000

# Search agent (gathers information)
search:
  model: "gpt-4o-2024-11-20-dzs-we"
  temperature: 0.7
  top_p: 1.0
  n: 1
  max_tokens: 16000

# Maintenance agent (system tasks)
maintenance:
  model: "gpt-4o-mini-2024-07-18-dzs-we"
  temperature: 0.5
  top_p: 1.0
  n: 1
  max_tokens: 4000

# Memorist agent (manages vector database)
memorist:
  model: "gpt-4o-mini-2024-07-18-dzs-we"
  temperature: 0.3
  top_p: 1.0
  n: 1
  max_tokens: 4000

# Reviewer agent (analyzes results)
reviewer:
  model: "gpt-4o-2024-11-20-dzs-we"
  temperature: 0.5
  top_p: 1.0
  n: 1
  max_tokens: 8000

# Reasoner agent (complex reasoning tasks)
# Using o3-mini for advanced reasoning
reasoner:
  model: "o3-mini-2025-01-31-dzs-sdc"
  temperature: 1.0
  top_p: 1.0
  n: 1
  max_tokens: 16000